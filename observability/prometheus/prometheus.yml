# Prometheus configuration for Iggy observability stack
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Iggy server metrics
  - job_name: 'iggy'
    static_configs:
      - targets: ['iggy:3000']
    metrics_path: '/metrics'
    scheme: 'http'

  # Sample application metrics (dedicated exporter listener on METRICS_PORT)
  - job_name: 'iggy-sample-app'
    static_configs:
      - targets: ['app:9090']
    metrics_path: '/metrics'
    scheme: 'http'
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
